    <style id="app-styles">
/* =========================================================================
   Brad Names Tunes — neon disco theme, mobile-first.
   Palette: chrome logo + magenta / electric-blue / purple over a dark stage.
   Layout goal: content vertically centered, everything fits one iPhone screen.
   ========================================================================= */

:root {
  /* deep stage base (matches the background image's darkest areas) */
  --bg-0: #0a0420;
  --bg-1: #160a34;
  --bg-2: #2a1158;

  --ink: #ffffff;
  --ink-dim: #cbb6f2; /* light lavender for secondary text */

  --magenta: #ff2d9e;
  --magenta-deep: #d6017d;
  --blue: #2f7bff;
  --blue-deep: #1450d6;
  --purple: #7a2bd6;
  --cyan: #00d2ff;
  --green: #21e07a; /* neon "correct" */
  --green-deep: #12b85f;
  --red: #ff2d6b; /* neon "wrong" */
  --red-deep: #d6014e;

  /* dark glass cards so content reads over the busy background */
  --panel: rgba(16, 7, 40, 0.52);
  --panel-line: rgba(190, 160, 255, 0.22);
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);

  /* iOS safe-area insets (fall back to 0 on non-notch devices) */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);

  --tap-min: 44px; /* Apple HIG minimum tap target */
  --gap: clamp(10px, 2.2vh, 18px); /* vertical rhythm, shrinks on short screens */

  /* Figtree everywhere; heavier weights carry the display text. */
  --font: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
    Helvetica, Arial, sans-serif;
  --font-display: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI',
    Roboto, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  min-height: 100dvh;
  color: var(--ink);
  font-family: var(--font);
  background-color: var(--bg-0); /* fallback behind the image */
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;

  /* Center #app vertically. margin:auto on the child is the scroll-safe way to
     center a flex item: when content is taller than the screen it overflows
     and scrolls instead of clipping the top. */
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

#app {
  margin: 0 auto; /* horizontal centering only */
  width: 100%;
  max-width: 480px;
  min-height: 100dvh; /* fill the screen so the 3 zones can spread out */
  padding:
    calc(var(--safe-top) + 16px)
    calc(var(--safe-right) + 16px)
    calc(var(--safe-bottom) + 96px) /* clearance for the fixed bottom bar */
    calc(var(--safe-left) + 16px);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

/* ---- Type ---------------------------------------------------------------- */

h1,
h2,
h3 {
  margin: 0;
  line-height: 1.05;
}

/* ---- Brand / logo -------------------------------------------------------- */

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
}

/* The hero PNG logo (replaces the old text logo + animated spotlights). */
.brand-logo {
  display: block;
  width: min(90vw, 440px);
  max-height: 30vh;
  height: auto;
  object-fit: contain;
  /* a soft halo that drifts pink -> blue, echoing the old spotlight motion */
  filter: drop-shadow(0 6px 24px rgba(255, 45, 158, 0.4));
  animation: logo-glow 5s ease-in-out infinite;
}
@keyframes logo-glow {
  0%, 100% { filter: drop-shadow(0 6px 22px rgba(255, 45, 158, 0.42)); }
  50% { filter: drop-shadow(0 8px 40px rgba(47, 123, 255, 0.5)); }
}

.brand .tagline {
  font-size: clamp(11px, 2.6vw, 13px);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dim);
  font-weight: 700;
}

.section-title {
  font-size: 13px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-dim);
  font-weight: 800;
  margin-bottom: 8px;
}

/* ---- Cards / panels ------------------------------------------------------ */

.card {
  background: var(--panel);
  border: 1px solid var(--panel-line);
  border-radius: 18px;
  padding: clamp(12px, 2.4vh, 18px);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.center {
  text-align: center;
}

.muted {
  color: var(--ink-dim);
}

.small {
  font-size: 13px;
}

.spacer {
  flex: 1 1 auto;
}

/* ---- Buttons ------------------------------------------------------------- */

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  touch-action: manipulation; /* kills the 300ms + double-tap-to-zoom on iOS */
  user-select: none;
  -webkit-user-select: none;
}

.btn {
  min-height: var(--tap-min);
  padding: 13px 20px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.01em;
  color: #fff;
  background: linear-gradient(180deg, var(--magenta) 0%, var(--magenta-deep) 100%);
  box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3), var(--shadow);
  transition: transform 0.05s ease, filter 0.1s ease;
  width: 100%;
}

.btn:active {
  transform: translateY(3px);
  filter: brightness(1.08);
  box-shadow: 0 3px 0 rgba(0, 0, 0, 0.3);
}

.btn:disabled {
  opacity: 0.4;
  filter: grayscale(0.3);
  box-shadow: none;
}

.btn-secondary {
  color: var(--ink);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.05) 100%);
  border: 1px solid var(--panel-line);
  box-shadow: var(--shadow);
}

.btn-pink {
  color: #fff;
  background: linear-gradient(180deg, var(--magenta) 0%, var(--magenta-deep) 100%);
}

.btn-blue {
  color: #fff;
  background: linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
}

.btn-green {
  color: #042b16;
  background: linear-gradient(180deg, #4dffa0 0%, var(--green) 100%);
}

.btn-red {
  color: #fff;
  background: linear-gradient(180deg, var(--red) 0%, var(--red-deep) 100%);
}

.btn-row {
  display: flex;
  gap: 12px;
}
.btn-row .btn {
  width: auto;
  flex: 1 1 0;
}

/* ---- Inputs / selects ---------------------------------------------------- */

input[type='text'],
select {
  width: 100%;
  min-height: var(--tap-min);
  padding: 12px 14px;
  font-size: 16px; /* >=16px stops iOS auto-zoom on focus */
  font-family: inherit;
  font-weight: 700;
  color: var(--ink);
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--panel-line);
  border-radius: 12px;
  appearance: none;
}

input::placeholder {
  color: rgba(203, 182, 242, 0.6);
}

label {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ---- Status pills / badges ----------------------------------------------- */

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid var(--panel-line);
  background: rgba(0, 0, 0, 0.25);
}
.pill .dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--ink-dim);
}
.pill.ok .dot {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}
.pill.warn .dot {
  background: var(--magenta);
  box-shadow: 0 0 8px var(--magenta);
}
.pill.bad .dot {
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
}

.row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

/* ---- Fixed bottom control bar (Pause + Missed-only) --------------------- */

.bottombar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 20;
  background: rgba(8, 3, 20, 0.62); /* dark, lowered opacity */
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid rgba(190, 160, 255, 0.14);
  padding:
    10px
    calc(var(--safe-right) + 14px)
    calc(var(--safe-bottom) + 10px)
    calc(var(--safe-left) + 14px);
}
.bottombar-inner {
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
}
.bar-btn {
  flex: 1 1 0;
  min-height: 48px;
  padding: 0 14px;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.14);
  transition: transform 0.05s ease, filter 0.1s ease, background 0.15s ease;
}
.bar-btn:active {
  transform: scale(0.98);
  filter: brightness(1.1);
}
.bar-btn:disabled {
  opacity: 0.4;
}
.bar-btn.filter-toggle.active {
  color: #fff;
  background: linear-gradient(180deg, var(--magenta) 0%, var(--magenta-deep) 100%);
  border-color: transparent;
  box-shadow: 0 0 16px rgba(255, 45, 158, 0.55);
}

/* ---- Three zones: logo (top) / centre info box / buzzer (bottom) --------- */

.middle {
  flex: 1 1 auto; /* takes the space between logo and buzzer */
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: 100%;
}

/* The static centre box: instructions, then the countdown, then the song.
   Fixed width AND height so it NEVER resizes as its content swaps between the
   start prompt, the big countdown number, and the revealed song title. */
.info-box {
  flex: 0 0 auto;
  width: min(100%, 360px);
  height: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  overflow: hidden; /* keep a long song title from stretching the box */
  text-align: center;
  border-color: rgba(255, 45, 158, 0.35);
  box-shadow: 0 0 30px rgba(255, 45, 158, 0.22), var(--shadow);
}

.buzzer-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.info-lead {
  font-family: var(--font-display);
  font-size: clamp(18px, 4.8vw, 24px);
  font-weight: 800;
  line-height: 1.15;
}
.info-sub {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-dim);
}
.info-note {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--magenta);
  margin-bottom: 2px;
}

/* The countdown — now lives in the centre box. */
.timer-num {
  font-family: var(--font-display);
  font-size: clamp(54px, 17vw, 88px);
  font-weight: 900;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 45, 158, 0.35);
}
.timer-num.low {
  color: #ff5a87;
  text-shadow: 0 0 26px rgba(255, 45, 107, 0.85);
  animation: count-pulse 0.6s ease-in-out infinite;
}
.timer-num.frozen {
  opacity: 0.6;
}

/* ---- Countdown number (lives inside the buzzer) -------------------------- */

.buzz-count {
  font-family: var(--font-display);
  font-size: clamp(58px, 23vw, 104px);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff; /* white on the frosted-glass face */
  text-shadow: 0 3px 18px rgba(0, 0, 0, 0.5), 0 0 36px rgba(255, 255, 255, 0.35);
}
.buzz-count.low {
  color: #ffd4df;
  text-shadow: 0 0 26px rgba(255, 45, 107, 0.9);
  animation: count-pulse 0.6s ease-in-out infinite;
}
@keyframes count-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.14); }
}

/* ---- Prompt text --------------------------------------------------------- */

.prompt {
  font-family: var(--font-display);
  font-size: clamp(18px, 4.6vw, 22px);
  font-weight: 800;
  line-height: 1.2;
  /* legible directly on the background image (no card behind it) */
  text-shadow: 0 2px 14px rgba(0, 0, 0, 0.75);
}
.muted-sub {
  display: block;
  margin-top: 5px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-dim);
  letter-spacing: 0.01em;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.7);
}

/* ---- Reveal (the answer) ------------------------------------------------- */

.reveal {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.np-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 900;
  margin: 2px 0;
}
.np-artist {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-dim);
}

/* ---- Big buzzer ---------------------------------------------------------- */

.bigplay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  /* scales to width AND height so the 3 zones all fit one screen */
  width: clamp(180px, min(66vw, 36vh), 320px);
  aspect-ratio: 1 / 1;
  margin: 4px auto;
  border-radius: 50%;
  color: #fff;
  font-size: clamp(20px, 5.5vw, 26px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  isolation: isolate;
  /* liquid glass: a frosted, tinted orb that refracts the background behind it */
  background:
    radial-gradient(120% 90% at 50% 16%, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.06) 42%, rgba(255, 255, 255, 0) 62%),
    linear-gradient(165deg, rgba(255, 120, 205, 0.5) 0%, rgba(255, 45, 158, 0.3) 45%, rgba(110, 18, 84, 0.42) 100%);
  -webkit-backdrop-filter: blur(16px) saturate(1.5);
  backdrop-filter: blur(16px) saturate(1.5);
  border: 1.5px solid rgba(255, 255, 255, 0.5);
  box-shadow:
    inset 0 8px 22px rgba(255, 255, 255, 0.5),
    inset 0 -24px 48px rgba(110, 10, 70, 0.45),
    0 22px 50px rgba(0, 0, 0, 0.5),
    0 0 55px rgba(255, 45, 158, 0.4);
  transition: transform 0.06s ease;
}
.bigplay:active {
  transform: scale(0.96);
}
.bigplay:disabled {
  opacity: 0.5;
}

/* The big text label inside START / REVEAL / NEXT / resume states. */
.buzz-label {
  font-family: var(--font-display);
  font-size: clamp(24px, 6.5vw, 34px);
  font-weight: 900;
  letter-spacing: 0.06em;
  line-height: 1;
}

/* The number/label/icon inside a button must NOT eat the tap — let it pass
   straight through to the button so the whole buzzer face is tappable. */
.buzz-count,
.buzz-label,
.bigplay .spinner,
.half span {
  pointer-events: none;
}

/* BUZZ + START: pulsing magenta ring invites the tap. */
.bigplay.buzz:not(:disabled),
.bigplay.start:not(:disabled) {
  animation: buzz-glow 1.8s ease-in-out infinite;
}
@keyframes buzz-glow {
  0%, 100% {
    box-shadow:
      inset 0 8px 22px rgba(255, 255, 255, 0.5),
      inset 0 -24px 48px rgba(110, 10, 70, 0.45),
      0 22px 50px rgba(0, 0, 0, 0.5),
      0 0 45px rgba(255, 45, 158, 0.4);
  }
  50% {
    box-shadow:
      inset 0 8px 24px rgba(255, 255, 255, 0.6),
      inset 0 -24px 48px rgba(110, 10, 70, 0.45),
      0 22px 50px rgba(0, 0, 0, 0.5),
      0 0 90px rgba(255, 45, 158, 0.7);
  }
}

/* REVEAL: same liquid glass, tinted electric blue so the 2nd tap reads different. */
.bigplay.reveal {
  color: #fff;
  background:
    radial-gradient(120% 90% at 50% 16%, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.06) 42%, rgba(255, 255, 255, 0) 62%),
    linear-gradient(165deg, rgba(130, 180, 255, 0.5) 0%, rgba(47, 123, 255, 0.3) 45%, rgba(18, 40, 110, 0.45) 100%);
  box-shadow:
    inset 0 8px 22px rgba(255, 255, 255, 0.5),
    inset 0 -24px 48px rgba(12, 32, 92, 0.5),
    0 22px 50px rgba(0, 0, 0, 0.5),
    0 0 55px rgba(47, 123, 255, 0.45);
}

/* SPLIT: the same circle cut down the middle into MISSED | GOT IT half-circles.
   The container clips two side-by-side buttons into semicircles. */
.bigplay.split {
  flex-direction: row;
  gap: 0;
  padding: 0;
  overflow: hidden; /* clips the halves to the circle */
  background: none; /* the halves provide the fill */
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  backdrop-filter: blur(16px) saturate(1.4);
  box-shadow:
    inset 0 8px 20px rgba(255, 255, 255, 0.35),
    0 22px 50px rgba(0, 0, 0, 0.5);
}
.half {
  /* each half is exactly 50% -> the circle is cut straight down the middle */
  flex: 1 1 50%;
  width: 50%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: none;
  font-family: var(--font-display);
  font-size: clamp(13px, 3.6vw, 17px);
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  white-space: nowrap; /* MISSED / GOT IT each stay on one line */
  color: #fff;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
  transition: filter 0.1s ease;
}
.half:active {
  filter: brightness(1.18);
}
/* MISSED = magenta (left), GOT IT = electric blue (right) — the bg/logo colors. */
.half-miss {
  background: linear-gradient(160deg, rgba(255, 120, 205, 0.58) 0%, rgba(214, 1, 125, 0.42) 100%);
  border-right: 1.5px solid rgba(255, 255, 255, 0.4); /* the centre divider */
}
.half-got {
  background: linear-gradient(160deg, rgba(140, 185, 255, 0.58) 0%, rgba(20, 80, 214, 0.45) 100%);
}

/* ---- Controls (Pause / Missed-only) ------------------------------------- */

.controls {
  margin: 0;
}

/* ---- Footer / logout (unused now, kept harmless) ------------------------ */

.footer {
  margin-top: 2px;
}
.logout-link {
  background: none;
  border: none;
  color: var(--ink-dim);
  font-size: 13px;
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px;
  padding: 8px 12px;
  opacity: 0.8;
}
.logout-link:active {
  opacity: 1;
}

/* ---- Banner / alerts ----------------------------------------------------- */

.banner {
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.45;
  border: 1px solid var(--panel-line);
}
.banner.info {
  background: rgba(47, 123, 255, 0.16);
  border-color: rgba(47, 123, 255, 0.45);
}
.banner.warn {
  background: rgba(255, 45, 158, 0.16);
  border-color: rgba(255, 45, 158, 0.45);
}
.banner.error {
  background: rgba(255, 45, 107, 0.18);
  border-color: rgba(255, 45, 107, 0.55);
}
.banner strong {
  color: #fff;
}

.hidden {
  display: none !important;
}

/* ---- Spinner ------------------------------------------------------------- */

.spinner {
  width: 22px;
  height: 22px;
  border: 3px solid rgba(255, 255, 255, 0.25);
  border-top-color: var(--magenta);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* ---- Full-screen loader overlay (initial load) -------------------------- */

.loader-overlay {
  position: fixed;
  inset: 0;
  z-index: 100; /* over the bottom bar and everything else */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  /* light scrim: the logo + buzzer stay visible underneath so nothing jumps */
  background: rgba(8, 3, 22, 0.32);
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
}
.loader {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  height: 56px;
}
.loader span {
  width: 9px;
  height: 100%;
  border-radius: 5px;
  transform-origin: bottom;
  background: linear-gradient(180deg, #ff8fcf, var(--magenta));
  box-shadow: 0 0 16px rgba(255, 45, 158, 0.5);
  animation: eq 1s ease-in-out infinite;
}
.loader span:nth-child(2) {
  background: linear-gradient(180deg, #a9caff, var(--blue));
  box-shadow: 0 0 16px rgba(47, 123, 255, 0.5);
  animation-delay: 0.12s;
}
.loader span:nth-child(3) {
  animation-delay: 0.24s;
}
.loader span:nth-child(4) {
  background: linear-gradient(180deg, #a9caff, var(--blue));
  box-shadow: 0 0 16px rgba(47, 123, 255, 0.5);
  animation-delay: 0.36s;
}
.loader span:nth-child(5) {
  animation-delay: 0.48s;
}
@keyframes eq {
  0%, 100% { transform: scaleY(0.28); }
  50% { transform: scaleY(1); }
}
.loader-msg {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-dim);
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
}

/* ---- Short screens: tighten everything so it still fits ------------------ */

@media (max-height: 700px) {
  :root {
    --gap: 9px;
  }
  .brand-logo {
    max-height: 24vh;
  }
  .info-box {
    height: 124px;
  }
  .bigplay {
    width: clamp(150px, min(56vw, 28vh), 230px);
  }
  .timer-num {
    font-size: clamp(46px, 15vw, 72px);
  }
}

/* ---- Landscape tweaks ---------------------------------------------------- */

@media (orientation: landscape) and (max-height: 520px) {
  #app {
    max-width: 680px;
  }
  .brand-logo {
    max-height: 22vh;
    width: min(40vw, 260px);
  }
  .info-box {
    height: 100px;
  }
  .timer-num {
    font-size: clamp(40px, 12vh, 64px);
  }
  .bigplay {
    width: min(30vh, 160px);
  }
}

/* ---- Larger screens ------------------------------------------------------ */

@media (min-width: 700px) {
  #app {
    max-width: 520px;
  }
  .btn {
    font-size: 19px;
  }
}

/* ---- Respect reduced-motion --------------------------------------------- */

@media (prefers-reduced-motion: reduce) {
  .brand-logo,
  .bigplay.buzz:not(:disabled),
  .bigplay.start:not(:disabled),
  .buzz-count.low,
  .song-box {
    animation: none !important;
  }
  .loader span {
    animation: none !important;
    transform: scaleY(0.6);
  }
}

      const app = document.getElementById('app');
      const AUTO_REVEAL_MS = 20000;
      const STREAK_TO_CLEAR = 3;

      const SONGS = [
        { id: '1', title: 'Bad Romance', artist: 'Lady Gaga' },
        { id: '2', title: 'More Than a Feeling', artist: 'Boston' },
        { id: '3', title: 'Crazy', artist: 'Seal' },
        { id: '4', title: "Don't Stop Believin'", artist: 'Journey' },
        { id: '5', title: 'Theme From Beverly Hills 90210', artist: 'John Davis' },
        { id: '6', title: 'Wake Me up When September Ends', artist: 'Green Day' },
      ];

      // tiny in-memory progress so "Missed only (N)" + filter behave for real
      const progress = {};
      function recordResult(id, correct) {
        const e = progress[id] || { wrong: false, streak: 0 };
        if (correct) {
          if (e.wrong) { e.streak++; if (e.streak >= STREAK_TO_CLEAR) { e.wrong = false; e.streak = 0; } }
        } else { e.wrong = true; e.streak = 0; }
        if (!e.wrong && !e.streak) delete progress[id]; else progress[id] = e;
      }
      function wrongCount(tracks) { return tracks.reduce((n, t) => (progress[t.id] && progress[t.id].wrong ? n + 1 : n), 0); }
      function filterWrong(tracks) { return tracks.filter((t) => progress[t.id] && progress[t.id].wrong); }

      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
      function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

      const state = {
        allTracks: SONGS.slice(),
        tracks: SONGS.slice(),
        queue: [],
        current: null,
        wrongOnly: false,
        phase: 'idle',
        autoMissed: false,
        timeLeftMs: AUTO_REVEAL_MS,
        timerId: null,
      };

      function brandHeader() { return `<div class="brand"><img class="brand-logo" src="${LOGO_SRC}" alt="Brad Names Tunes" /></div>`; }
      function mount(html) { app.innerHTML = html; }
      function $(id) { return document.getElementById(id); }
      function on(id, evt, fn) { const n = $(id); if (n) n.addEventListener(evt, fn); }

      function timerNum(extra = '') {
        const secs = Math.ceil(state.timeLeftMs / 1000);
        const low = state.timeLeftMs <= 5000 ? ' low' : '';
        return `<div class="timer-num${low}${extra}" id="timerCount">${secs}</div>`;
      }

      function infoBoxContent() {
        const cur = state.current;
        if (state.phase === 'revealed' && cur) {
          return `
            ${state.autoMissed ? `<div class="info-note">Time's up - marked wrong</div>` : ''}
            <div class="np-title">${esc(cur.title)}</div>
            <div class="np-artist">${esc(cur.artist)}</div>
          `;
        }
        if (state.phase === 'playing' && cur) return timerNum();
        if (state.phase === 'buzzed' && cur) return timerNum(' frozen');
        if (state.phase === 'paused' && cur) return `<div class="info-lead">Paused</div><div class="info-sub">Hit the buzzer to resume</div>`;
        if (state.tracks.length === 0) {
          return `
            <div class="info-lead">${state.wrongOnly ? 'No missed songs yet' : 'No songs loaded'}</div>
            <div class="info-sub">${state.wrongOnly ? 'Turn off the Missed only filter to practice the full list.' : 'Check songs.json in the tracks folder.'}</div>`;
        }
        return `
          <div class="info-lead">Hit the buzzer to start</div>
          <div class="info-sub">${state.tracks.length} song${state.tracks.length === 1 ? '' : 's'}${state.wrongOnly ? ' flagged' : ''}</div>`;
      }

      function buzzerZoneContent() {
        const cur = state.current;
        if (state.phase === 'revealed' && cur) {
          if (state.autoMissed) return `<button id="buzzer" class="bigplay next"><span class="buzz-label">NEXT &#9654;</span></button>`;
          return `
            <div class="bigplay split" role="group" aria-label="Grade your guess">
              <button id="missBtn" class="half half-miss"><span>MISSED</span></button>
              <button id="gotBtn" class="half half-got"><span>GOT IT</span></button>
            </div>`;
        }
        if (state.phase === 'buzzed' && cur) return `<button id="buzzer" class="bigplay reveal"><span class="buzz-label">REVEAL</span></button>`;
        if (state.phase === 'playing' && cur) return `<button id="buzzer" class="bigplay buzz"><span class="buzz-label">BUZZ</span></button>`;
        if (state.phase === 'paused' && cur) return `<button id="buzzer" class="bigplay resume"><span class="buzz-label">&#9654;</span></button>`;
        if (state.tracks.length === 0) return '';
        return `<button id="buzzer" class="bigplay start"><span class="buzz-label">START</span></button>`;
      }

      function controlsHtml() {
        const wrongN = wrongCount(state.allTracks);
        const canPause = state.phase === 'playing';
        const canFilter = state.phase === 'idle' || state.phase === 'paused';
        return `
          <div class="bottombar">
            <div class="bottombar-inner">
              <button id="pauseBtn" class="bar-btn" ${canPause ? '' : 'disabled'}>&#10074;&#10074; Pause</button>
              <button id="filterToggle" class="bar-btn filter-toggle ${state.wrongOnly ? 'active' : ''}" ${canFilter ? '' : 'disabled'}>
                ${state.wrongOnly ? '&#9733; Missed only' : 'Missed only'}${wrongN ? ` (${wrongN})` : ''}
              </button>
            </div>
          </div>`;
      }

      function renderGame() {
        mount(`
          ${brandHeader()}
          <div class="middle">
            <div class="info-box card">${infoBoxContent()}</div>
          </div>
          <div class="buzzer-zone">
            ${buzzerZoneContent()}
          </div>
          <div id="errorArea"></div>
          ${controlsHtml()}
        `);
        on('buzzer', 'click', onBuzzerTap);
        on('gotBtn', 'click', () => onGrade(true));
        on('missBtn', 'click', () => onGrade(false));
        on('pauseBtn', 'click', onPause);
        on('filterToggle', 'click', onToggleWrongOnly);
      }

      function startTimer() {
        stopTimer();
        state.timerId = setInterval(() => {
          state.timeLeftMs -= 100;
          if (state.timeLeftMs <= 0) { state.timeLeftMs = 0; updateTimerDom(); stopTimer(); onTimeUp(); return; }
          updateTimerDom();
        }, 100);
      }
      function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
      function updateTimerDom() { const c = $('timerCount'); if (c) { c.textContent = Math.ceil(state.timeLeftMs / 1000); c.classList.toggle('low', state.timeLeftMs <= 5000); } }

      function applyTrackSet() { state.tracks = state.wrongOnly ? filterWrong(state.allTracks) : state.allTracks; state.queue = shuffle(state.tracks); }
      function startFresh() { state.queue = shuffle(state.tracks); nextRound(); }
      function nextRound() {
        state.autoMissed = false;
        if (state.tracks.length === 0) { state.phase = 'idle'; renderGame(); return; }
        if (state.queue.length === 0) state.queue = shuffle(state.tracks);
        state.current = state.queue.shift();
        state.phase = 'playing';
        state.timeLeftMs = AUTO_REVEAL_MS;
        renderGame();
        startTimer();
      }
      function onBuzzerTap() {
        switch (state.phase) {
          case 'idle': startFresh(); break;
          case 'playing': buzzLockIn(); break;
          case 'paused': resumePlay(); break;
          case 'buzzed': state.autoMissed = false; state.phase = 'revealed'; renderGame(); break;
          case 'revealed': if (state.autoMissed) nextRound(); break;
        }
      }
      function buzzLockIn() { stopTimer(); state.phase = 'buzzed'; renderGame(); }
      function resumePlay() { state.phase = 'playing'; renderGame(); startTimer(); }
      function onGrade(correct) { if (!state.current) return; recordResult(state.current.id, correct); nextRound(); }
      function onTimeUp() { if (state.current) recordResult(state.current.id, false); state.autoMissed = true; state.phase = 'revealed'; renderGame(); }
      function onPause() { if (state.phase !== 'playing') return; stopTimer(); state.phase = 'paused'; renderGame(); }
      function onToggleWrongOnly() { state.wrongOnly = !state.wrongOnly; stopTimer(); applyTrackSet(); state.current = null; state.phase = 'idle'; renderGame(); }

      // ---- mockup state switcher ----
      function jump(to) {
        stopTimer();
        state.wrongOnly = false; state.tracks = state.allTracks;
        if (to === 'idle') { state.current = null; state.phase = 'idle'; }
        else if (to === 'playing') { state.current = SONGS[0]; state.phase = 'playing'; state.timeLeftMs = AUTO_REVEAL_MS; renderGame(); startTimer(); return; }
        else if (to === 'buzzed') { state.current = SONGS[0]; state.phase = 'buzzed'; state.timeLeftMs = 12000; }
        else if (to === 'revealed') { state.current = SONGS[2]; state.autoMissed = false; state.phase = 'revealed'; }
        else if (to === 'automiss') { state.current = SONGS[4]; state.autoMissed = true; state.timeLeftMs = 0; state.phase = 'revealed'; }
        else if (to === 'paused') { state.current = SONGS[0]; state.phase = 'paused'; }
        else if (to === 'empty') { state.wrongOnly = true; state.tracks = filterWrong(state.allTracks); state.current = null; state.phase = 'idle'; }
        renderGame();
      }
      document.querySelectorAll('#mockup-tools [data-jump]').forEach((b) => b.addEventListener('click', () => jump(b.getAttribute('data-jump'))));
      document.getElementById('mtHide').addEventListener('click', () => { document.getElementById('mockup-tools').style.display = 'none'; document.getElementById('mockup-show').style.display = 'block'; });
      document.getElementById('mockup-show').addEventListener('click', () => { document.getElementById('mockup-tools').style.display = 'flex'; document.getElementById('mockup-show').style.display = 'none'; });

      applyTrackSet();
      renderGame();
    </script>
  </body>
</html>
