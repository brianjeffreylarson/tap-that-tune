<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tap That Track — polished design</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" />

    <!-- ===================================================================
         The real styles. Verbatim copy of src/styles.css.
         The background image is loaded from assets/bg.webp (the original).
         =================================================================== -->
    <style id="app-styles">
/* =========================================================================
   Tap That Track — neon disco theme, mobile-first.
   Original bg image + shimmering floating orbs overlay.
   Layout: 3 vertical zones (logo / info-box / buzzer) inside a mobile
   viewport. On desktop, .screen is wrapped in a CSS iPhone bezel for
   preview. On real mobile it goes full-bleed.
   ========================================================================= */

:root {
  --bg-0: #0a0420;
  --bg-1: #160a34;
  --bg-2: #2a1158;

  --ink: #ffffff;
  --ink-dim: #cbb6f2;

  --magenta: #ff2d9e;
  --magenta-deep: #d6017d;
  --blue: #2f7bff;
  --blue-deep: #1450d6;
  --purple: #7a2bd6;
  --cyan: #00d2ff;
  --green: #21e07a;
  --green-deep: #12b85f;
  --red: #ff2d6b;
  --red-deep: #d6014e;

  --panel: rgba(16, 7, 40, 0.52);
  --panel-line: rgba(190, 160, 255, 0.22);
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);

  --tap-min: 44px;

  --font: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-display: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* =========================================================================
   Canvas + phone bezel (desktop preview) — invisible on real mobile
   ========================================================================= */
body {
  min-height: 100dvh;
  color: var(--ink);
  background: #08031a;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(60% 50% at 50% 60%, rgba(122, 43, 214, 0.22), transparent 70%),
    radial-gradient(40% 30% at 20% 30%, rgba(255, 45, 158, 0.12), transparent 70%),
    radial-gradient(40% 30% at 80% 80%, rgba(47, 123, 255, 0.12), transparent 70%);
  z-index: 0;
}

.phone {
  --phone-h: min(844px, calc(100dvh - 32px));
  --phone-w: calc(var(--phone-h) * 390 / 844);
  position: relative;
  width: var(--phone-w);
  height: var(--phone-h);
  border-radius: calc(56px * var(--phone-h) / 844);
  padding: calc(14px * var(--phone-h) / 844);
  background: linear-gradient(160deg, #2a2238 0%, #0c0820 60%, #1a1430 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.06),
    inset 0 0 0 2px rgba(0, 0, 0, 0.6),
    0 40px 80px rgba(0, 0, 0, 0.55),
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 0 80px rgba(122, 43, 214, 0.18);
  z-index: 1;
  flex: 0 0 auto;
}
.phone::before {
  content: '';
  position: absolute;
  top: calc(11px * var(--phone-h) / 844 + 10px);
  left: 50%;
  transform: translateX(-50%);
  width: calc(120px * var(--phone-h) / 844);
  height: calc(34px * var(--phone-h) / 844);
  border-radius: calc(20px * var(--phone-h) / 844);
  background: #000;
  z-index: 30;
}
.phone::after {
  content: '';
  position: absolute;
  bottom: calc(8px * var(--phone-h) / 844);
  left: 50%;
  transform: translateX(-50%);
  width: calc(134px * var(--phone-h) / 844);
  height: 5px;
  border-radius: 100px;
  background: rgba(255, 255, 255, 0.55);
  z-index: 30;
  pointer-events: none;
}

.screen {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: calc(42px * var(--phone-h) / 844);
  overflow: hidden;
  background: var(--bg-0);
  isolation: isolate;
  container-type: size;
  container-name: screen;
}

/* iOS status bar (decorative; real OS provides one on mobile) */
.statusbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: clamp(38px, 6.5cqh, 54px);
  z-index: 25;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(12px, 2cqh, 18px) clamp(22px, 8cqw, 32px) 0;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  font-size: clamp(12px, 4cqw, 16px);
  font-weight: 600;
  color: #fff;
  pointer-events: none;
}
.statusbar .right { display: inline-flex; align-items: center; gap: 6px; }
.statusbar svg { display: block; }

/* Full-bleed on real mobile */
@media (max-width: 500px) {
  body { background: var(--bg-0); display: block; overflow: auto; }
  body::before { display: none; }
  .phone {
    width: 100vw; height: 100dvh;
    border-radius: 0; padding: 0; box-shadow: none; background: transparent;
  }
  .phone::before, .phone::after { display: none; }
  .screen { border-radius: 0; }
  .statusbar { display: none; }
}

/* =========================================================================
   Background — the ORIGINAL disco-stage image + floating shimmer orbs
   ========================================================================= */

.bg-stage {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background-color: var(--bg-0);
  background-image: url('assets/bg.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
/* slight contrast lift so foreground UI reads cleanly */
.bg-stage::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(120% 80% at 50% 100%, rgba(8, 3, 22, 0.55) 0%, transparent 60%),
    linear-gradient(180deg, rgba(8, 3, 22, 0.0) 50%, rgba(8, 3, 22, 0.35) 100%);
  pointer-events: none;
}

/* Shimmering floating orbs — small, bright, drifting dots that match
   the size and shape of the disco-light pinpoints in the bg image. */
.orbs {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  mix-blend-mode: screen;
  opacity: 0;
  animation:
    orb-shimmer var(--shimmer, 2.8s) ease-in-out infinite,
    orb-drift var(--drift, 14s) ease-in-out infinite alternate;
  animation-delay: var(--delay, 0s), var(--delay, 0s);
}
@keyframes orb-shimmer {
  0%, 100% { opacity: 0.22; transform: scale(0.85); }
  50%      { opacity: 1;    transform: scale(1.25); }
}
@keyframes orb-drift {
  0%   { translate: 0 0; }
  100% { translate: var(--dx, 12px) var(--dy, -18px); }
}

/* =========================================================================
   App shell
   ========================================================================= */

#app {
  position: relative;
  z-index: 3;
  width: 100%;
  height: 100%;
  padding:
    clamp(48px, 8cqh, 64px)
    clamp(14px, 4.4cqw, 20px)
    clamp(76px, 12cqh, 92px)    /* matches actual bottombar height so buzzer-zone fills to the bar */
    clamp(14px, 4.4cqw, 20px);
  display: flex;
  flex-direction: column;
  align-items: center;
  /* brand → stats → info packed near the top, buzzer fills + centers in remainder */
  justify-content: flex-start;
  gap: 0;
}

@media (max-width: 500px) {
  #app {
    padding:
      calc(var(--safe-top) + 16px)
      calc(var(--safe-right) + 16px)
      calc(var(--safe-bottom) + 96px)
      calc(var(--safe-left) + 16px);
    height: 100dvh;
  }
}

h1, h2, h3 { margin: 0; line-height: 1.05; }

/* ---- Brand --------------------------------------------------------------- */

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
  flex: 0 0 auto;
  margin-bottom: clamp(10px, 2.6cqh, 18px);
  position: relative;
  isolation: isolate;
}
.brand::before {
  /* wavy floaty pink-white glow behind the logo */
  content: '';
  position: absolute;
  inset: -10% -8%;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(45% 60% at 30% 45%, rgba(255, 200, 230, 0.55), transparent 70%),
    radial-gradient(50% 55% at 70% 60%, rgba(255, 130, 200, 0.45), transparent 70%),
    radial-gradient(35% 40% at 50% 30%, rgba(255, 240, 250, 0.5), transparent 70%);
  filter: blur(22px);
  opacity: 0.85;
  animation: brand-aura-wobble 9s ease-in-out infinite alternate;
  border-radius: 50%;
}
.brand::after {
  /* second softer drift layer offset in phase */
  content: '';
  position: absolute;
  inset: -6% -4%;
  z-index: -1;
  pointer-events: none;
  background: radial-gradient(60% 50% at 60% 50%, rgba(255, 170, 215, 0.4), transparent 75%);
  filter: blur(18px);
  opacity: 0.7;
  animation: brand-aura-wobble 11s ease-in-out -3s infinite alternate;
}
@keyframes brand-aura-wobble {
  0%   { transform: translate(-4%, 2%) scale(1) rotate(-3deg); opacity: 0.7; }
  35%  { transform: translate(3%, -1%) scale(1.08) rotate(2deg); opacity: 0.95; }
  70%  { transform: translate(-2%, 3%) scale(0.96) rotate(-1deg); opacity: 0.8; }
  100% { transform: translate(4%, -2%) scale(1.05) rotate(3deg); opacity: 1; }
}
.brand-logo {
  display: block;
  width: min(78cqw, 320px);
  max-height: clamp(100px, 20cqh, 180px);
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 6px 24px rgba(255, 45, 158, 0.4));
  animation: logo-glow 5s ease-in-out infinite;
}
@keyframes logo-glow {
  0%, 100% { filter: drop-shadow(0 6px 22px rgba(255, 45, 158, 0.42)); }
  50%      { filter: drop-shadow(0 8px 40px rgba(47, 123, 255, 0.5)); }
}

/* ---- Stats strip (streak + avg time) ------------------------------------ */

.stats {
  display: flex;
  gap: clamp(8px, 2.4cqw, 12px);
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  margin-bottom: clamp(8px, 2.4cqw, 12px);  /* same as pill-gap: stats-to-infobox spacing matches inter-pill spacing */
}
.stat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 11px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--panel-line);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-size: clamp(10px, 3cqw, 13px);
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--ink);
  line-height: 1;
}
.stat .stat-label {
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: clamp(8px, 2.4cqw, 10px);
  font-weight: 700;
  color: var(--ink-dim);
}
.stat .stat-val {
  font-variant-numeric: tabular-nums;
  font-weight: 800;
  font-size: clamp(12px, 3.6cqw, 15px);
}
.stat .stat-icon { width: 13px; height: 13px; display: block; flex: 0 0 13px; }
.stat.streak .stat-val { color: #fff; text-shadow: 0 0 10px rgba(255, 200, 100, 0.55); }

/* ---- Info box ----------------------------------------------------------- */

.info-box {
  flex: 0 0 auto;
  width: min(100%, 360px);
  height: clamp(120px, 22cqh, 180px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  overflow: hidden;
  text-align: center;
  position: relative;

  background: var(--panel);
  border: 1px solid var(--panel-line);
  border-radius: 22px;
  padding: clamp(12px, 2.4cqh, 20px);
  border-color: rgba(255, 45, 158, 0.35);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.04) inset,
    0 0 36px rgba(255, 45, 158, 0.22),
    var(--shadow);
  -webkit-backdrop-filter: blur(14px) saturate(1.3);
  backdrop-filter: blur(14px) saturate(1.3);
}
.info-box::before {
  content: '';
  position: absolute;
  inset: 1px 1px auto 1px;
  height: 50%;
  border-radius: 21px 21px 60% 60% / 21px 21px 30% 30%;
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 80%);
  pointer-events: none;
}

/* ---- Reveal: a bright highlight orbits the box outline ------------------- */
.info-box.revealed::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: conic-gradient(
    from var(--angle, 0deg),
    rgba(255, 255, 255, 0) 0deg,
    rgba(255, 255, 255, 0) 220deg,
    rgba(255, 255, 255, 0.25) 270deg,
    rgba(255, 255, 255, 0.85) 320deg,
    #ffffff 335deg,
    rgba(255, 255, 255, 0.85) 350deg,
    rgba(255, 255, 255, 0.25) 35deg,
    rgba(255, 255, 255, 0) 80deg,
    rgba(255, 255, 255, 0) 360deg
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
          mask-composite: exclude;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
  /* Single fast orbit, then quick fade.
     Custom easing nudges the highlight faster through the long top/bottom edges
     and gives a beat at the corners, so the perceived linear speed reads more
     consistent on a wide info-box. */
  animation:
    reveal-orbit 0.65s cubic-bezier(0.45, 0.0, 0.55, 1.0) 1 forwards,
    reveal-orbit-fade 0.25s ease 0.62s forwards;
}
@property --angle {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}
@keyframes reveal-orbit {
  to { --angle: 360deg; }
}
@keyframes reveal-orbit-fade {
  to { opacity: 0; }
}

.info-lead {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(24px, 7cqw, 34px);
  line-height: 1.1;
  text-wrap: balance;
}
.info-sub {
  font-size: clamp(12px, 3.4cqw, 15px);
  font-weight: 600;
  color: var(--ink-dim);
  letter-spacing: 0.02em;
}
.info-note {
  font-size: clamp(9px, 2.6cqw, 12px);
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--magenta);
  margin-bottom: 4px;
  text-shadow: 0 0 14px rgba(255, 45, 158, 0.7);
}

/* The countdown */
.timer-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(82px, 30cqw, 150px);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff;
  letter-spacing: -0.02em;
  text-shadow:
    0 2px 16px rgba(0, 0, 0, 0.4),
    0 0 30px rgba(255, 45, 158, 0.35);
  transition: color 0.4s ease, text-shadow 0.4s ease;
}
.timer-num.mid {
  color: #ffd680;
  text-shadow: 0 2px 16px rgba(0,0,0,0.4), 0 0 28px rgba(255, 180, 80, 0.55);
}
.timer-num.low {
  color: #ff5a87;
  text-shadow: 0 0 30px rgba(255, 45, 107, 0.85);
  animation: count-pulse 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
}
.timer-num.frozen { opacity: 0.55; animation: none; }

.timer-num.tick { animation: count-tick 0.32s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes count-tick {
  0%   { transform: scale(0.78); opacity: 0.4; }
  60%  { transform: scale(1.12); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes count-pulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.12); }
}

/* ---- Reveal ------------------------------------------------------------- */

.reveal { display: flex; flex-direction: column; gap: 4px; width: 100%; }
.np-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(28px, 8.8cqw, 42px);
  line-height: 1.05;
  margin: 2px 0;
  color: #fff;
  text-shadow:
    0 2px 12px rgba(0, 0, 0, 0.55),
    0 0 22px rgba(255, 45, 158, 0.45);
}
.np-artist {
  font-size: clamp(13px, 3.8cqw, 16px);
  font-weight: 600;
  color: var(--ink-dim);
}
@keyframes reveal-pop {
  0%   { transform: scale(0.7); opacity: 0; }
  60%  { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes reveal-fade {
  0%   { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Cross-fade between info-box phases
   ONLY the first paint fades in — state transitions stay instant for fluidity. */
.fade-swap.first-paint > * { animation: phase-fade 0.32s ease both; }
@keyframes phase-fade {
  0%   { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* =========================================================================
   Buzzer — polished liquid glass orb
   ========================================================================= */

.buzzer-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  flex: 1 1 auto;          /* fill the remaining space… */
  min-height: 0;
  /* …so the buzzer sits centered between info-box bottom and bottombar top */
}

.bigplay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: clamp(160px, min(58cqw, 30cqh), 280px);
  aspect-ratio: 1 / 1;
  margin: 4px auto;
  border-radius: 50%;
  color: #fff;
  font-size: clamp(20px, 5.5cqw, 26px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  isolation: isolate;
  border: none;
  cursor: pointer;
  position: relative;
  transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);

  background:
    radial-gradient(120% 90% at 50% 14%, rgba(255,255,255,0.55), rgba(255,255,255,0.08) 40%, rgba(255,255,255,0) 60%),
    radial-gradient(100% 100% at 50% 50%, rgba(255, 45, 158, 0.28) 60%, transparent 100%),
    linear-gradient(165deg,
      color-mix(in oklab, var(--magenta) 55%, white 0%) 0%,
      color-mix(in oklab, var(--magenta) 60%, black 25%) 50%,
      color-mix(in oklab, var(--magenta-deep) 85%, black 0%) 100%);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  backdrop-filter: blur(16px) saturate(1.6);
  border: 1.5px solid rgba(255, 255, 255, 0.5);
  box-shadow:
    inset 0 10px 26px rgba(255, 255, 255, 0.55),
    inset 0 -28px 56px color-mix(in oklab, var(--magenta-deep) 60%, black 25%),
    inset 0 0 0 1px rgba(255, 255, 255, 0.18),
    0 22px 50px rgba(0, 0, 0, 0.55),
    0 0 60px rgba(255, 45, 158, 0.45);
}
.bigplay:active { transform: scale(0.94); }
.bigplay:disabled { opacity: 0.5; cursor: not-allowed; }

/* crescent highlight */
.bigplay::before {
  content: '';
  position: absolute;
  inset: 6% 10% auto 10%;
  height: 36%;
  border-radius: 50%;
  background: radial-gradient(120% 100% at 50% 0%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
  filter: blur(2px);
  pointer-events: none;
}
/* specular dot */
.bigplay::after {
  content: '';
  position: absolute;
  top: 14%;
  left: 22%;
  width: 16%;
  height: 8%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
  filter: blur(1px);
  pointer-events: none;
}

/* Tap ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 60%);
  animation: ripple 0.7s ease-out forwards;
  z-index: 3;
}
@keyframes ripple {
  0%   { transform: scale(0); opacity: 1; }
  100% { transform: scale(3.2); opacity: 0; }
}

.buzz-label {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(30px, 9cqw, 48px);
  letter-spacing: 0.06em;
  line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  pointer-events: none;     /* let the click pass through to the button */
}
/* IMPORTANT: only the LABEL is click-transparent — children of split halves
   (which ARE the buttons) must remain interactive. */

.bigplay.buzz:not(:disabled),
.bigplay.start:not(:disabled) {
  animation: buzz-glow 1.8s ease-in-out infinite;
}
@keyframes buzz-glow {
  0%, 100% {
    box-shadow:
      inset 0 10px 24px rgba(255,255,255,0.5),
      inset 0 -28px 52px color-mix(in oklab, var(--magenta-deep) 60%, black 25%),
      0 22px 50px rgba(0,0,0,0.55),
      0 0 50px rgba(255, 45, 158, 0.4);
  }
  50% {
    box-shadow:
      inset 0 10px 26px rgba(255,255,255,0.6),
      inset 0 -28px 52px color-mix(in oklab, var(--magenta-deep) 60%, black 25%),
      0 22px 50px rgba(0,0,0,0.55),
      0 0 100px rgba(255, 45, 158, 0.75);
  }
}

/* REVEAL — tinted electric blue */
.bigplay.reveal {
  background:
    radial-gradient(120% 90% at 50% 14%, rgba(255,255,255,0.55), rgba(255,255,255,0.08) 40%, rgba(255,255,255,0) 60%),
    radial-gradient(100% 100% at 50% 50%, rgba(47, 123, 255, 0.32) 60%, transparent 100%),
    linear-gradient(165deg,
      color-mix(in oklab, var(--blue) 55%, white 0%) 0%,
      color-mix(in oklab, var(--blue) 60%, black 25%) 50%,
      color-mix(in oklab, var(--blue-deep) 85%, black 0%) 100%);
  box-shadow:
    inset 0 10px 26px rgba(255,255,255,0.55),
    inset 0 -28px 56px color-mix(in oklab, var(--blue-deep) 60%, black 25%),
    inset 0 0 0 1px rgba(255,255,255,0.18),
    0 22px 50px rgba(0,0,0,0.55),
    0 0 60px rgba(47, 123, 255, 0.45);
}

/* SPLIT — MISSED | GOT IT semicircles — share the 3D depth of the main button */
.bigplay.split {
  flex-direction: row;
  gap: 0;
  padding: 0;
  overflow: hidden;
  background: none;
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  backdrop-filter: blur(16px) saturate(1.6);
  border: 1.5px solid rgba(255, 255, 255, 0.5);
  box-shadow:
    inset 0 10px 26px rgba(255, 255, 255, 0.55),
    inset 0 -28px 56px rgba(20, 8, 50, 0.55),
    inset 0 0 0 1px rgba(255, 255, 255, 0.18),
    0 22px 50px rgba(0, 0, 0, 0.55),
    0 0 60px rgba(255, 45, 158, 0.35);
}
.bigplay.split::before,
.bigplay.split::after { display: none; }
.half {
  flex: 1 1 50%;
  width: 50%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: none;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(16px, 4.6cqw, 22px);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
  transition: filter 0.12s ease, transform 0.08s ease;
  cursor: pointer;
  position: relative;
  isolation: isolate;
}
.half:active { filter: brightness(1.18); transform: scale(0.97); }
/* MISSED — cool purple liquid glass */
.half-miss {
  background:
    radial-gradient(120% 90% at 50% 14%, rgba(255,255,255,0.55), rgba(255,255,255,0.08) 40%, rgba(255,255,255,0) 60%),
    radial-gradient(100% 100% at 50% 50%, rgba(122, 43, 214, 0.32) 60%, transparent 100%),
    linear-gradient(165deg,
      color-mix(in oklab, var(--purple) 60%, white 0%) 0%,
      color-mix(in oklab, var(--purple) 65%, black 25%) 50%,
      color-mix(in oklab, var(--purple) 90%, black 35%) 100%);
  box-shadow:
    inset 0 10px 24px rgba(255, 255, 255, 0.42),
    inset 0 -22px 44px rgba(28, 8, 68, 0.55);
  border-right: 1.5px solid rgba(255, 255, 255, 0.42);
}
/* GOT IT — bright white liquid glass with a lavender undertone */
.half-got {
  background:
    radial-gradient(120% 90% at 50% 14%, rgba(255,255,255,0.7), rgba(255,255,255,0.18) 40%, rgba(255,255,255,0) 60%),
    radial-gradient(100% 100% at 50% 50%, rgba(0, 210, 255, 0.22) 60%, transparent 100%),
    linear-gradient(165deg,
      #ffffff 0%,
      #f0e9ff 45%,
      #cdb8f5 100%);
  color: #2a1158;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 2px 8px rgba(255,255,255,0.4);
  box-shadow:
    inset 0 10px 24px rgba(255, 255, 255, 0.85),
    inset 0 -22px 44px rgba(180, 150, 230, 0.55);
}
/* specular sheen on each half to echo the main button */
.half::before {
  content: '';
  position: absolute;
  top: 8%;
  left: 18%;
  width: 18%;
  height: 10%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 70%);
  filter: blur(1px);
  pointer-events: none;
  z-index: 1;
}
.half > span { pointer-events: none; position: relative; z-index: 2; }

/* =========================================================================
   Bottom bar
   ========================================================================= */

.bottombar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 20;
  background: rgba(8, 3, 20, 0.55);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  backdrop-filter: blur(14px) saturate(1.2);
  border-top: 1px solid rgba(190, 160, 255, 0.18);
  padding: clamp(8px, 1.4cqh, 12px) clamp(12px, 3.6cqw, 16px) clamp(18px, 3cqh, 24px) clamp(12px, 3.6cqw, 16px);
}
.bottombar-inner {
  margin: 0 auto;
  display: flex;
  gap: clamp(6px, 2cqw, 10px);
}
.bar-btn {
  flex: 1 1 0;
  min-width: 0;
  min-height: clamp(40px, 7cqh, 48px);
  padding: 0 clamp(8px, 2.4cqw, 14px);
  border-radius: 14px;
  font-family: var(--font);
  font-size: clamp(11px, 3.4cqw, 14px);
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.13);
  transition: transform 0.08s ease, filter 0.12s ease, background 0.18s ease, box-shadow 0.18s ease;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  overflow: hidden;
  white-space: nowrap;
}
.bar-btn:active { transform: scale(0.97); filter: brightness(1.1); }
.bar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.bar-btn .label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-btn .ico { width: 14px; height: 14px; flex: 0 0 14px; }
.bar-btn.filter-toggle.active {
  color: #fff;
  background: linear-gradient(180deg, var(--magenta) 0%, var(--magenta-deep) 100%);
  border-color: transparent;
  box-shadow: 0 0 18px rgba(255, 45, 158, 0.55);
}
@container screen (max-width: 320px) {
  .bar-btn .ico { display: none; }
  .bar-btn { gap: 0; }
}
@media (max-width: 500px) {
  .bottombar {
    padding:
      10px
      calc(var(--safe-right) + 14px)
      calc(var(--safe-bottom) + 10px)
      calc(var(--safe-left) + 14px);
  }
}

/* =========================================================================
   Confetti (GOT IT)
   ========================================================================= */
.confetti-layer {
  position: absolute;
  inset: 0;
  z-index: 40;     /* above #app */
  pointer-events: none;
  overflow: hidden;
}
.confetti {
  position: absolute;
  width: 9px;
  height: 13px;
  border-radius: 2px;
  /* base style: visible at the start of animation */
  opacity: 1;
  animation: conf var(--dur, 1.4s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes conf {
  0%   { opacity: 1; transform: translate(0,0) rotate(0); }
  60%  { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rz)); }
}

/* =========================================================================
   Reduced motion
   ========================================================================= */
@media (prefers-reduced-motion: reduce) {
  .brand-logo, .bigplay.buzz:not(:disabled), .bigplay.start:not(:disabled),
  .timer-num.low, .orb, .brand::before, .brand::after {
    animation: none !important;
  }
}

    </style>
  </head>
  <body>

    <div class="phone">
      <div class="screen">

        <div class="bg-stage" aria-hidden="true"></div>
        <div class="orbs" id="orbs" aria-hidden="true"></div>

        <div class="statusbar" aria-hidden="true">
          <span>9:41</span>
          <span class="right">
            <svg width="18" height="11" viewBox="0 0 18 11" fill="none"><rect x="0" y="7" width="3" height="4" rx="0.5" fill="currentColor"/><rect x="5" y="5" width="3" height="6" rx="0.5" fill="currentColor"/><rect x="10" y="2.5" width="3" height="8.5" rx="0.5" fill="currentColor"/><rect x="15" y="0" width="3" height="11" rx="0.5" fill="currentColor"/></svg>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.5l-2-2a2.83 2.83 0 014 0l-2 2zM2.5 5.5a8.5 8.5 0 0112 0l-1.4 1.4a6.5 6.5 0 00-9.2 0L2.5 5.5zM.5 3.5a11.3 11.3 0 0116 0l-1.4 1.4a9.3 9.3 0 00-13.2 0L.5 3.5z" fill="currentColor"/></svg>
            <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="19" height="8" rx="1.4" fill="currentColor"/><rect x="24" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.5"/></svg>
          </span>
        </div>

        <div id="app"></div>

        <div id="confetti" class="confetti-layer" aria-hidden="true"></div>

      </div>
    </div>

    <!-- MOCKUP-ONLY: state switcher -->
    <div id="mockup-tools">
      <div class="mt-title">Mockup states</div>
      <button data-jump="idle">Idle / Start</button>
      <button data-jump="playing">Playing (timer)</button>
      <button data-jump="buzzed">Buzzed / Reveal</button>
      <button data-jump="revealed">Revealed + grade</button>
      <button data-jump="automiss">Auto-miss / Next</button>
      <button data-jump="paused">Paused</button>
      <button data-jump="empty">Missed-only (empty)</button>
      <button class="mt-hide" id="mtHide">hide panel</button>
    </div>
    <button id="mockup-show">states</button>

    <script>
      // ====================================================================
      // Tap That Track — polished mock. Same game logic as src/main.js.
      // NO audio. Dummy songs + fake countdown drive the visuals.
      // ====================================================================
      const LOGO_SRC = 'assets/logo.png';
      const app = document.getElementById('app');
      const confettiLayer = document.getElementById('confetti');
      const AUTO_REVEAL_MS = 20000;
      const STREAK_TO_CLEAR = 3;

      const SONGS = [
        { id: '1', title: 'Bad Romance', artist: 'Lady Gaga' },
        { id: '2', title: 'More Than a Feeling', artist: 'Boston' },
        { id: '3', title: 'Crazy', artist: 'Seal' },
        { id: '4', title: "Don't Stop Believin'", artist: 'Journey' },
        { id: '5', title: 'Theme From Beverly Hills 90210', artist: 'John Davis' },
        { id: '6', title: 'Wake Me up When September Ends', artist: 'Green Day' },
      ];

      // ---- Floating shimmer orbs ----
      // Match the size + shape of the disco-light pinpoints in the bg image.
      (function buildOrbs() {
        const layer = document.getElementById('orbs');
        const colors = [
          { c: 'rgba(255, 130, 210, 1)', glow: 'rgba(255, 45, 158, 0.95)' },   // magenta
          { c: 'rgba(190, 210, 255, 1)', glow: 'rgba(47, 123, 255, 0.95)' },   // blue
          { c: 'rgba(255, 255, 255, 1)', glow: 'rgba(255, 255, 255, 0.85)' },  // white
          { c: 'rgba(230, 180, 255, 1)', glow: 'rgba(190, 130, 255, 0.95)' },  // lavender
          { c: 'rgba(150, 235, 255, 1)', glow: 'rgba(0, 210, 255, 0.85)' },    // cyan
        ];
        const N = 32;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < N; i++) {
          const o = document.createElement('span');
          o.className = 'orb';
          const isHero = i % 8 === 0;
          const size = isHero ? (7 + Math.random() * 5) : (3 + Math.random() * 5);
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const color = colors[i % colors.length];
          const dx = (Math.random() * 36 - 18).toFixed(1) + 'px';
          const dy = (Math.random() * 36 - 18).toFixed(1) + 'px';
          const shimmer = (1.8 + Math.random() * 3).toFixed(2) + 's';
          const drift = (10 + Math.random() * 14).toFixed(1) + 's';
          const delay = (-Math.random() * 4).toFixed(2) + 's';

          o.style.width = o.style.height = size + 'px';
          o.style.left = x + '%';
          o.style.top = y + '%';
          o.style.background = color.c;
          /* two-stop halo: tight bright core + wider soft glow */
          o.style.boxShadow =
            `0 0 ${(size * 1.8).toFixed(1)}px ${color.glow},` +
            `0 0 ${(size * 5).toFixed(1)}px ${color.glow}`;
          o.style.setProperty('--dx', dx);
          o.style.setProperty('--dy', dy);
          o.style.setProperty('--shimmer', shimmer);
          o.style.setProperty('--drift', drift);
          o.style.setProperty('--delay', delay);

          frag.appendChild(o);
        }
        layer.appendChild(frag);
      })();

      // ---- Haptic feedback ----
      function haptic(ms = 18) {
        if (navigator.vibrate) { try { navigator.vibrate(ms); } catch(e) {} }
      }

      // ---- Progress / scoring ----
      const progress = {};
      const stats = {
        streak: 0,             // current consecutive correct
        bestStreak: 0,
        correct: 0,            // total correct
        wrong: 0,              // total wrong (incl. auto-miss)
        timesMs: [],           // ms-to-buzz on successful guesses
      };
      function recordResult(id, correct, timeToBuzzMs) {
        const e = progress[id] || { wrong: false, streak: 0 };
        if (correct) {
          stats.correct++;
          if (e.wrong) {
            e.streak++;
            if (e.streak >= STREAK_TO_CLEAR) { e.wrong = false; e.streak = 0; }
          }
          stats.streak++;
          if (stats.streak > stats.bestStreak) stats.bestStreak = stats.streak;
          if (typeof timeToBuzzMs === 'number' && timeToBuzzMs > 0) {
            stats.timesMs.push(timeToBuzzMs);
            if (stats.timesMs.length > 20) stats.timesMs.shift();
          }
        } else {
          stats.wrong++;
          e.wrong = true; e.streak = 0;
          stats.streak = 0;
        }
        if (!e.wrong && !e.streak) delete progress[id]; else progress[id] = e;
      }
      function wrongCount(tracks) { return tracks.reduce((n, t) => (progress[t.id] && progress[t.id].wrong ? n + 1 : n), 0); }
      function filterWrong(tracks) { return tracks.filter((t) => progress[t.id] && progress[t.id].wrong); }
      function avgGuessSec() {
        if (!stats.timesMs.length) return null;
        const ms = stats.timesMs.reduce((a, b) => a + b, 0) / stats.timesMs.length;
        return (ms / 1000);
      }

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
      }
      function shuffle(a) {
        a = a.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      const state = {
        allTracks: SONGS.slice(),
        tracks: SONGS.slice(),
        queue: [],
        current: null,
        wrongOnly: false,
        phase: 'idle',
        autoMissed: false,
        timeLeftMs: AUTO_REVEAL_MS,
        timerId: null,
        prevSecs: null,
        roundStart: 0,
        timeToBuzzMs: 0,
      };

      function brandHeader() {
        return `<div class="brand"><img class="brand-logo" src="${LOGO_SRC}" alt="Tap That Track" /></div>`;
      }

      function statsRow() {
        const avg = avgGuessSec();
        const total = stats.correct + stats.wrong;
        const flameSvg = `<svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 2c2 4-1 6-1 9a3 3 0 006 0c0-1.5-.5-2.5-1.5-3.5 3 1 5 4 5 7.5a8 8 0 11-15.4-3.1c.8 1.8 2.6 3.1 4.4 3.1-2-3 0-7 2.5-13z"/></svg>`;
        const clockSvg = `<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`;
        const targetSvg = `<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>`;
        const fireClass = '';
        const avgStr = avg !== null ? avg.toFixed(1) + 's' : '—';
        const winStr = total > 0 ? `${stats.correct}/${total}` : '—';
        return `
          <div class="stats">
            <div class="stat win">
              ${targetSvg}
              <span class="stat-label">Win</span>
              <span class="stat-val">${winStr}</span>
            </div>
            <div class="stat avg">
              ${clockSvg}
              <span class="stat-label">Avg</span>
              <span class="stat-val">${avgStr}</span>
            </div>
            <div class="stat streak${fireClass}">
              ${flameSvg}
              <span class="stat-label">Streak</span>
              <span class="stat-val">${stats.streak}</span>
            </div>
          </div>`;
      }

      function timerNum(extra = '') {
        const secs = Math.ceil(state.timeLeftMs / 1000);
        const cls = state.timeLeftMs <= 5000 ? ' low' : (state.timeLeftMs <= 10000 ? ' mid' : '');
        return `<div class="timer-num${cls}${extra}" id="timerCount">${secs}</div>`;
      }

      function infoBoxContent() {
        const cur = state.current;
        if (state.phase === 'revealed' && cur) {
          return `
            <div class="reveal">
              ${state.autoMissed ? `<div class="info-note">Time's up · marked wrong</div>` : ''}
              <div class="np-title">${esc(cur.title)}</div>
              <div class="np-artist">${esc(cur.artist)}</div>
            </div>`;
        }
        if (state.phase === 'playing' && cur) return timerNum();
        if (state.phase === 'buzzed' && cur) return timerNum(' frozen');
        if (state.phase === 'paused' && cur) return `<div class="info-lead">Paused</div><div class="info-sub">Hit the buzzer to resume</div>`;
        if (state.tracks.length === 0) {
          return `
            <div class="info-lead">${state.wrongOnly ? 'No missed songs yet' : 'No songs loaded'}</div>
            <div class="info-sub">${state.wrongOnly ? 'Turn off Missed to practise the full list.' : 'Check songs.json in the tracks folder.'}</div>`;
        }
        return `
          <div class="info-lead">Hit the buzzer to start</div>
          <div class="info-sub">${state.tracks.length} song${state.tracks.length === 1 ? '' : 's'}${state.wrongOnly ? ' flagged' : ''}</div>`;
      }

      function buzzerZoneContent() {
        const cur = state.current;
        if (state.phase === 'revealed' && cur) {
          if (state.autoMissed) return `<button id="buzzer" class="bigplay next"><span class="buzz-label">NEXT &#9654;</span></button>`;
          return `
            <div class="bigplay split" role="group" aria-label="Grade your guess">
              <button id="missBtn" class="half half-miss"><span>MISSED</span></button>
              <button id="gotBtn" class="half half-got"><span>GOT IT</span></button>
            </div>`;
        }
        if (state.phase === 'buzzed' && cur) return `<button id="buzzer" class="bigplay reveal"><span class="buzz-label">REVEAL</span></button>`;
        if (state.phase === 'playing' && cur) return `<button id="buzzer" class="bigplay buzz"><span class="buzz-label">BUZZ</span></button>`;
        if (state.phase === 'paused' && cur) return `<button id="buzzer" class="bigplay resume"><span class="buzz-label">&#9654;</span></button>`;
        if (state.tracks.length === 0) return '';
        return `<button id="buzzer" class="bigplay start"><span class="buzz-label">START</span></button>`;
      }

      function controlsHtml() {
        const wrongN = wrongCount(state.allTracks);
        const canPause = state.phase === 'playing';
        const canFilter = state.phase === 'idle' || state.phase === 'paused';
        return `
          <div class="bottombar">
            <div class="bottombar-inner">
              <button id="pauseBtn" class="bar-btn" ${canPause ? '' : 'disabled'}>
                <svg class="ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
                <span class="label">Pause</span>
              </button>
              <button id="filterToggle" class="bar-btn filter-toggle ${state.wrongOnly ? 'active' : ''}" ${canFilter ? '' : 'disabled'}>
                <svg class="ico" viewBox="0 0 24 24" fill="${state.wrongOnly ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linejoin="round" stroke-linecap="round" d="M12 3l2.6 5.6L20 9.4l-4.2 4.1 1 5.9L12 16.8 7.2 19.4l1-5.9L4 9.4l5.4-.8z"/></svg>
                <span class="label">Missed${wrongN ? ` (${wrongN})` : ''}</span>
              </button>
            </div>
          </div>`;
      }

      function mount(html) { app.innerHTML = html; }
      function $(id) { return document.getElementById(id); }
      function on(id, evt, fn) { const n = $(id); if (n) n.addEventListener(evt, fn); }

      let firstPaint = true;
      function renderGame() {
        const fpClass = firstPaint ? ' first-paint' : '';
        const revealClass = (state.phase === 'revealed' && state.current && !state.autoMissed) ? ' revealed' : '';
        mount(`
          ${brandHeader()}
          ${statsRow()}
          <div class="info-box card fade-swap${fpClass}${revealClass}">${infoBoxContent()}</div>
          <div class="buzzer-zone">
            ${buzzerZoneContent()}
          </div>
          ${controlsHtml()}
        `);
        firstPaint = false;
        on('buzzer', 'click', onBuzzerTap);
        on('gotBtn', 'click', onGotIt);
        on('missBtn', 'click', onMissed);
        on('pauseBtn', 'click', onPause);
        on('filterToggle', 'click', onToggleWrongOnly);

        // ripple + haptic on tap
        const bp = $('buzzer');
        if (bp) bp.addEventListener('pointerdown', (e) => { addRipple(bp, e); haptic(18); });
        const half1 = $('missBtn'); const half2 = $('gotBtn');
        if (half1) half1.addEventListener('pointerdown', (e) => { addRipple(half1.parentElement, e); haptic(18); });
        if (half2) half2.addEventListener('pointerdown', (e) => { addRipple(half2.parentElement, e); haptic(18); });
        const pb = $('pauseBtn');
        if (pb) pb.addEventListener('pointerdown', () => haptic(10));
        const ft = $('filterToggle');
        if (ft) ft.addEventListener('pointerdown', () => haptic(10));
      }

      function addRipple(el, e) {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) || r.width / 2;
        const y = (e.clientY - r.top)  || r.height / 2;
        const d = Math.max(r.width, r.height);
        const node = document.createElement('span');
        node.className = 'ripple';
        node.style.width = node.style.height = d + 'px';
        node.style.left = (x - d / 2) + 'px';
        node.style.top = (y - d / 2) + 'px';
        el.appendChild(node);
        setTimeout(() => node.remove(), 750);
      }

      function startTimer() {
        stopTimer();
        state.prevSecs = Math.ceil(state.timeLeftMs / 1000);
        state.timerId = setInterval(() => {
          state.timeLeftMs -= 100;
          if (state.timeLeftMs <= 0) {
            state.timeLeftMs = 0;
            updateTimerDom();
            stopTimer();
            onTimeUp();
            return;
          }
          updateTimerDom();
        }, 100);
      }
      function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
      function updateTimerDom() {
        const c = $('timerCount');
        if (!c) return;
        const secs = Math.ceil(state.timeLeftMs / 1000);
        c.textContent = secs;
        c.classList.toggle('low', state.timeLeftMs <= 5000);
        c.classList.toggle('mid', state.timeLeftMs <= 10000 && state.timeLeftMs > 5000);
        if (state.prevSecs !== secs) {
          c.classList.remove('tick');
          void c.offsetWidth;
          c.classList.add('tick');
          state.prevSecs = secs;
          if (state.timeLeftMs <= 5000) haptic(8);
        }
      }

      function applyTrackSet() {
        state.tracks = state.wrongOnly ? filterWrong(state.allTracks) : state.allTracks;
        state.queue = shuffle(state.tracks);
      }
      function startFresh() { state.queue = shuffle(state.tracks); nextRound(); }
      function nextRound() {
        state.autoMissed = false;
        if (state.tracks.length === 0) { state.phase = 'idle'; renderGame(); return; }
        if (state.queue.length === 0) state.queue = shuffle(state.tracks);
        state.current = state.queue.shift();
        state.phase = 'playing';
        state.timeLeftMs = AUTO_REVEAL_MS;
        state.roundStart = Date.now();
        renderGame();
        startTimer();
      }
      function onBuzzerTap() {
        switch (state.phase) {
          case 'idle': haptic(22); startFresh(); break;
          case 'playing': haptic(28); buzzLockIn(); break;
          case 'paused': haptic(18); resumePlay(); break;
          case 'buzzed': haptic(18); state.autoMissed = false; state.phase = 'revealed'; renderGame(); break;
          case 'revealed': if (state.autoMissed) { haptic(18); nextRound(); } break;
        }
      }
      function buzzLockIn() {
        stopTimer();
        state.timeToBuzzMs = Date.now() - state.roundStart;
        state.phase = 'buzzed';
        renderGame();
      }
      function resumePlay() { state.phase = 'playing'; renderGame(); startTimer(); }
      function onGotIt() {
        haptic(30);
        if (!state.current) return;
        recordResult(state.current.id, true, state.timeToBuzzMs);
        burstConfetti();
        // small delay so the confetti is visibly mid-air when the next round renders
        setTimeout(() => nextRound(), 80);
      }
      function onMissed() {
        haptic(40);
        if (!state.current) return;
        recordResult(state.current.id, false);
        nextRound();
      }
      function onTimeUp() {
        if (state.current) recordResult(state.current.id, false);
        state.autoMissed = true;
        state.phase = 'revealed';
        haptic(40);
        renderGame();
      }
      function onPause() {
        haptic(10);
        if (state.phase !== 'playing') return;
        stopTimer();
        state.phase = 'paused';
        renderGame();
      }
      function onToggleWrongOnly() {
        haptic(10);
        state.wrongOnly = !state.wrongOnly;
        stopTimer();
        applyTrackSet();
        state.current = null;
        state.phase = 'idle';
        renderGame();
      }

      // ---- Confetti ----
      function burstConfetti() {
        // Palette only: magenta, electric blue, purple, lavender, cyan, warm white
        const cs = ['#ff2d9e', '#2f7bff', '#7a2bd6', '#cbb6f2', '#00d2ff', '#ffffff'];
        const N = 44;
        const rect = confettiLayer.getBoundingClientRect();
        // burst origin: roughly where the buzzer is (lower-middle of screen)
        const ox = 50;
        const oy = 70;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < N; i++) {
          const el = document.createElement('span');
          el.className = 'confetti';
          // fan upward in a wide arc
          const angle = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI * 0.95;
          const dist = 180 + Math.random() * 280;
          const dx = Math.cos(angle) * dist;
          const dy = Math.sin(angle) * dist;
          el.style.left = ox + '%';
          el.style.top = oy + '%';
          el.style.setProperty('--dx', dx.toFixed(0) + 'px');
          el.style.setProperty('--dy', dy.toFixed(0) + 'px');
          el.style.setProperty('--rz', (Math.random() * 720 - 360).toFixed(0) + 'deg');
          el.style.setProperty('--dur', (1.1 + Math.random() * 0.9).toFixed(2) + 's');
          el.style.background = cs[i % cs.length];
          el.style.transform = `rotate(${(Math.random() * 360).toFixed(0)}deg)`;
          frag.appendChild(el);
        }
        confettiLayer.appendChild(frag);
        // clean up
        setTimeout(() => {
          // remove just-fired set; safe to remove the oldest matching count
          for (let i = 0; i < N && confettiLayer.firstChild; i++) {
            confettiLayer.firstChild.remove();
          }
        }, 2200);
      }

      // ---- Mockup state switcher ----
      function jump(to) {
        stopTimer();
        state.wrongOnly = false; state.tracks = state.allTracks;
        if (to === 'idle') { state.current = null; state.phase = 'idle'; }
        else if (to === 'playing') {
          state.current = SONGS[0]; state.phase = 'playing'; state.timeLeftMs = AUTO_REVEAL_MS;
          state.roundStart = Date.now();
          renderGame(); startTimer(); return;
        }
        else if (to === 'buzzed') {
          state.current = SONGS[0]; state.phase = 'buzzed'; state.timeLeftMs = 12000;
          state.timeToBuzzMs = 8000;
        }
        else if (to === 'revealed') { state.current = SONGS[2]; state.autoMissed = false; state.phase = 'revealed'; state.timeToBuzzMs = 6500; }
        else if (to === 'automiss') { state.current = SONGS[4]; state.autoMissed = true; state.timeLeftMs = 0; state.phase = 'revealed'; }
        else if (to === 'paused') { state.current = SONGS[0]; state.phase = 'paused'; }
        else if (to === 'empty') { state.wrongOnly = true; state.tracks = filterWrong(state.allTracks); state.current = null; state.phase = 'idle'; }
        renderGame();
      }
      document.querySelectorAll('#mockup-tools [data-jump]').forEach((b) => b.addEventListener('click', () => jump(b.getAttribute('data-jump'))));
      document.getElementById('mtHide').addEventListener('click', () => { document.getElementById('mockup-tools').style.display = 'none'; document.getElementById('mockup-show').style.display = 'block'; });
      document.getElementById('mockup-show').addEventListener('click', () => { document.getElementById('mockup-tools').style.display = 'flex'; document.getElementById('mockup-show').style.display = 'none'; });

      // Boot
      applyTrackSet();
      renderGame();
    </script>
  </body>
</html>
